<!DOCTYPE html>
<html lang = "en-us">
<head>
    <meta charset="UTF-8">
    <title>mywebsite</title>
    <style>
        body{
            background-color: #0a0a0a;
            font-family: 'Courier New', Courrier, monospace;
            color: #ffffff;
            marging: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container{
            max-width: 800px;
            width: 100%;
        }
        h1{
            font-family: 'Times New Roman', Times, serif;
            font-size: 3rem;
            color: #ffffff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .project-card{
            background-color: #111;
            border: 1px solid #222;
            padding: 20px;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }
        .project-card:hover{
            border-color: #555;
        }
        .lang-tag{
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>// Portfolio.</h1>
    <p>lore ipsum lore ipsum</p>
    <h2>Projetos em destaque</h2>
    {{range .Projetos}}
    <div class="project-card">
        <h3>{{.Nome}}</h3>
        <span class="lang-tag">[{{.Linguagem}}]</span>
        <p>{{.Descricao}}</p>
    </div>
    {{end}}
</div>

</body>
</html>
